services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+asyncpg://induction:induction@postgres:5432/induction
    depends_on:
      - qdrant
      - postgres

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: induction
      POSTGRES_PASSWORD: induction
      POSTGRES_DB: induction
    ports:
      - "5433:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data

volumes:
  qdrant_storage:
  postgres_storage:
